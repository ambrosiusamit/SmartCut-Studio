<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SmartCut Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 0; background:#0b0c10; color:#e5e7eb; }
    header, footer { padding: 24px; text-align: center; }
    header h1 { margin: 0 0 8px; font-size: 28px; }
    header p { margin: 0; color:#9ca3af; }
    main { max-width: 1000px; margin: 0 auto; padding: 16px; }
    .upload { display:flex; gap:12px; align-items:center; flex-wrap:wrap; background:#111827; border:1px solid #1f2937; padding:12px; border-radius:12px; }
    .upload input[type="file"] { padding:6px; }
    .inline { display:flex; align-items:center; gap:6px; }
    #status { color:#93c5fd; font-weight:600; }
    #results h2 { margin-top: 24px; }
    .hidden { display:none; }
    #sceneList { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:12px; }
    .card { background:#0f172a; border:1px solid #1f2937; border-radius:12px; overflow:hidden; }
    .card img { display:block; width:100%; height:150px; object-fit:cover; background:#111827; }
    .meta { padding:8px 10px; font-size:14px; color:#cbd5e1; }
    .tags { display:flex; flex-wrap:wrap; gap:6px; padding:0 10px 8px; }
    .tag { font-size:12px; background:#1f2937; padding:2px 8px; border-radius:999px; color:#e5e7eb; border:1px solid #374151; }
    .controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:14px 0; }
    #downloadBox a { color:#a7f3d0; }
    footer small { color:#9ca3af; }
  </style>
</head>
<body>
  <header>
    <h1>SmartCut Studio</h1>
    <p>AI-assisted scene cuts, beat-synced transitions, object-aware highlights & Whisper transcription.</p>
  </header>

  <main>
    <section class="upload">
      <input id="file" type="file" accept="video/*" />
      <label class="inline"><input id="doTranscribe" type="checkbox"> Transcribe speech (Whisper)</label>
      <input id="lang" type="text" placeholder="Language hint (optional, e.g. en)" />
      <button id="analyzeBtn">Analyze</button>
      <span id="status"></span>
    </section>

    <section id="results" class="hidden">
      <h2>Scenes</h2>
      <div id="sceneList"></div>

      <div class="controls">
        <label>Transition:
          <select id="transition">
            <option value="crossfade" selected>Crossfade</option>
            <option value="cut">Straight Cut</option>
          </select>
        </label>
        <label>Crossfade (sec): <input id="transitionSec" type="number" min="0" value="0.5" step="0.1"></label>
        <label class="inline"><input id="alignBeats" type="checkbox" checked> Align cuts to beats</label>
        <button id="renderBtn">Render Selected</button>
      </div>

      <div id="downloadBox" class="hidden"></div>

      <div id="transcriptBox" class="hidden">
        <h2>Transcript (preview)</h2>
        <pre id="transcriptPreview"></pre>
        <div id="transcriptLinks"></div>
      </div>
    </section>
  </main>

  <footer>
    <small>Built with FastAPI · OpenCV · PySceneDetect · MoviePy · Whisper</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
